kind = "web"
previewPath = "/"
title = "Trinity Packaging"
version = "1.0.0"
id = "artifacts/trinity-packaging"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21939
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trinity-packaging run dev"

[services.env]
PORT = "21939"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trinity-packaging", "run", "build"]
publicDir = "artifacts/trinity-packaging/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
